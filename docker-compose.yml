# One-command implementation of Task 2/3 against REAL databases.
#
#   docker compose up --build
#
# Brings up MySQL + MongoDB, creates the schema, loads the data into both,
# then serves the FastAPI app at http://localhost:8000/docs
#
# Tips:
#   SAMPLE_MONTHS=6 docker compose up --build   # load only last 6 months (fast)
#   docker compose down -v                       # stop + wipe the DB volumes

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: beijing
      MYSQL_DATABASE: beijing_air
    ports:
      - "3306:3306"
    volumes:
      # schema is created automatically on first container init
      - ./sql/schema_mysql.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pbeijing"]
      interval: 5s
      timeout: 5s
      retries: 30

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 30

  # one-shot: load the dataset into both databases, then exit
  loader:
    build: .
    command: python db/load_to_servers.py
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: beijing
      MYSQL_DB: beijing_air
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: beijing_air
      SAMPLE_MONTHS: "${SAMPLE_MONTHS:-0}"
    volumes:
      - ./data:/app/data        # real CSVs in data/raw/ are picked up here

  # the FastAPI service (Task 3), wired to the real databases
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir api
    depends_on:
      loader:
        condition: service_completed_successfully
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: beijing
      MYSQL_DB: beijing_air
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: beijing_air
    ports:
      - "8000:8000"

volumes:
  mysql_data:
  mongo_data:
